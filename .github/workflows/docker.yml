name: Build & publish Docker image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version tag for the image (e.g., 1.0.0)'
        required: false
        type: string
      latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kaneo

jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="${REGISTRY}/${OWNER_LC}/${IMAGE_NAME}"
          VERSION_TAG="${{ inputs.version }}"
          TAG_LATEST="${{ inputs.latest }}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG_LATEST="true"
          fi

          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${TAG_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ steps.image.outputs.tag_latest == 'true' }}
            type=raw,value=${{ steps.image.outputs.version_tag }},enable=${{ steps.image.outputs.version_tag != '' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.kaneo
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
